apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "payment-app-chart.fullname" . }}-ingress
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "payment-app-chart.labels" . | nindent 4 }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
  - host: payment-app.pl
    http:
      paths:
      - path: /api-path
        pathType: Prefix
        # pathType: ImplementationSpecific
        backend:
          service:
            name: {{ include "payment-app-chart.fullname" . }}-svc
            port:
              number: {{ .Values.service.port }}